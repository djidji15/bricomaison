
{%load static %}
<link rel="stylesheet" href="{% static 'css/logo.css' %}">
{% block coontent %}
 

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>login</title>
</head>
<body>
    <div class="login-box">
        <h2>connexion</h2>
       
        <form method="POST">
            {% csrf_token %}
                
            <div class="user-box">
                <input type="text" name="username" required="">
                <label>adresse </label>
            </div>
            <div class="user-box">
                <input type="password" name="password" required="">
                <label>mot de passe</label>
            </div>
            <center>
                <button type="submit">
                     <span>Envoyer</span>
                    </button>
                
            </center>
        </form>
        {% if error_message %}
           <p class="error">{{ error_message }}</p>
        {% endif %}
    </div>
</body>
</html>
{% endblock coontent %}
